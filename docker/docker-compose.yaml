services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-sky_poc}
      POSTGRES_USER: ${DB_USER:-sky_poc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sky_poc}
    # Host 15432 avoids clashing with a local Postgres on 5432; inside the container Postgres still listens on 5432.
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sky_poc -d sky_poc"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-sky_poc}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-sky_poc}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-sky_poc}
    depends_on:
      postgres:
        condition: service_healthy
